<!doctype html>
<!--
  Grounded decision matrix — LEAN by default. Render with render.mjs.

  The structure IS the argument. Every value is written by you from real facts, so
  it's accurate by construction (no model invents a cell). The point is a 2-second
  GLANCE, not a read:
    - Title <= ~6 words. No sub-line, no footer, no reassurance text.
    - Cells are symbols / short labels (✓ ✕ –), never sentences.
    - Option chips <= ~6 words; mark the recommended one with class="rec".
    - Highlight the row the person actually decides with class="decide".
  If you're tempted to add a sentence inside the card, the columns are wrong — fix
  the structure instead. Two cells that contradict (✓ / ✕ on the decide row) say
  "broken" with no prose at all.

  This example: a real, generic call — "where should deploy alerts go?" Replace the
  rows/columns/options with yours.

  NEED OPTIONS x DIMENSIONS? Add more columns (Cost / Effort / Risk …) with short
  cell values — but keep them labels, not sentences, and drop any column the
  decider doesn't actually weigh.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         background: #f5f6f8; color: #1e293b; padding: 40px; }
  .card { width: 720px; background: #fff; border-radius: 16px; padding: 32px 36px;
          box-shadow: 0 10px 40px rgba(15,23,42,.08); border: 1px solid #e8ebf0; }
  h1 { font-size: 21px; font-weight: 700; color: #0f2742; margin-bottom: 22px; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 15px; }
  th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #eef1f5; }
  th:not(:first-child), td:not(:first-child) { text-align: center; }
  thead th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em;
             color: #64748b; font-weight: 600; }
  tbody td:first-child { font-weight: 600; color: #0f2742; }
  .yes { color: #15803d; font-weight: 700; }
  .no  { color: #b91c1c; font-weight: 700; }
  .mut { color: #cbd5e1; }
  .decide { background: #fff7ed; }
  .decide td { border-bottom: 1px solid #fde6cf; }
  .pill { display: inline-block; font-size: 10.5px; font-weight: 700; color: #c2410c;
          background: #ffedd5; border-radius: 999px; padding: 2px 8px; margin-left: 8px; }
  .opts { display: flex; gap: 10px; margin-top: 22px; }
  .opt { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 13px 16px;
         font-size: 14.5px; font-weight: 600; color: #334155; }
  .opt.rec { border-color: #15803d; color: #0f2742; }
  .opt .n { color: #94a3b8; font-weight: 700; margin-right: 6px; }
  .opt.rec .n { color: #15803d; }
  .opt.rec::after { content: " ✓"; color: #15803d; }
</style>
</head>
<body>
  <div class="card">
    <h1>Where should deploy alerts go?</h1>
    <table>
      <thead>
        <tr><th>Channel</th><th>Team sees it</th><th>Pages on-call</th><th>Noise</th></tr>
      </thead>
      <tbody>
        <tr><td>Email</td><td class="no">✕</td><td class="no">✕</td><td class="mut">low</td></tr>
        <tr class="decide"><td>Chat <span class="pill">today</span></td><td class="yes">✓</td><td class="no">✕</td><td class="mut">low</td></tr>
        <tr><td>PagerDuty</td><td class="yes">✓</td><td class="yes">✓</td><td class="no">high</td></tr>
      </tbody>
    </table>
    <div class="opts">
      <div class="opt rec"><span class="n">1</span>Keep Chat only</div>
      <div class="opt"><span class="n">2</span>Add PagerDuty for failures</div>
    </div>
  </div>
</body>
</html>
