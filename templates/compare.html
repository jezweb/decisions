<!doctype html>
<!--
  A/B approach comparison — LEAN by default. Render with render.mjs.

  Use when the decision is "which APPROACH?" — two genuine paths, decided by the
  two or three trade-offs that actually matter. (More than two options, or many
  dimensions → matrix.html. A SET to approve → manifest.html.)

    - Title <= ~6 words, phrased as the question.
    - First column = the trade-off; the other two = approach A / approach B.
    - Cells are short verdicts (✓ / ✕ / one word), never sentences.
    - Recommend a column with class="rec" on its <th> and the matching option chip.
  Pick the 2-3 trade-offs that DECIDE it and drop the rest — a row the decider
  doesn't weigh is noise. If a cell needs a sentence, the trade-off is too coarse.

  Generic example — replace with your real approaches.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         background: #f5f6f8; color: #1e293b; padding: 40px; }
  .card { width: 660px; background: #fff; border-radius: 16px; padding: 32px 36px;
          box-shadow: 0 10px 40px rgba(15,23,42,.08); border: 1px solid #e8ebf0; }
  h1 { font-size: 21px; font-weight: 700; color: #0f2742; margin-bottom: 22px; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14.5px; }
  th, td { padding: 12px 16px; border-bottom: 1px solid #eef1f5; text-align: center; }
  th:first-child, td:first-child { text-align: left; }
  thead th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em;
             color: #64748b; font-weight: 600; }
  thead th.rec { color: #0f2742; }
  thead th.rec::after { content: " ✓"; color: #15803d; }
  tbody td:first-child { font-weight: 600; color: #0f2742; }
  td.rec { background: #f0fdf4; }
  .yes { color: #15803d; font-weight: 700; }
  .no  { color: #b91c1c; font-weight: 700; }
  .mut { color: #64748b; }
  .opts { display: flex; gap: 10px; margin-top: 22px; }
  .opt { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 13px 16px;
         font-size: 14.5px; font-weight: 600; color: #334155; }
  .opt.rec { border-color: #15803d; color: #0f2742; }
  .opt .n { color: #94a3b8; font-weight: 700; margin-right: 6px; }
  .opt.rec .n { color: #15803d; }
  .opt.rec::after { content: " ✓"; color: #15803d; }
</style>
</head>
<body>
  <div class="card">
    <h1>Background jobs: Queue or Cron?</h1>
    <table>
      <thead>
        <tr><th></th><th class="rec">Queue</th><th>Cron</th></tr>
      </thead>
      <tbody>
        <tr><td>Latency</td><td class="rec yes">seconds</td><td class="no">up to 1 hr</td></tr>
        <tr><td>Retries</td><td class="rec yes">built-in</td><td class="no">manual</td></tr>
        <tr><td>Setup effort</td><td class="rec mut">low</td><td class="mut">low</td></tr>
      </tbody>
    </table>
    <div class="opts">
      <div class="opt rec"><span class="n">1</span>Queue</div>
      <div class="opt"><span class="n">2</span>Cron</div>
    </div>
  </div>
</body>
</html>
