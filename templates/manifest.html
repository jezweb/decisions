<!doctype html>
<!--
  Manifest / batch-approve — LEAN by default. Render with render.mjs.

  Use when the decision is "ship this SET?" — a batch of PRs, a deploy go/no-go,
  a list of migrations. ONE go/no-go over the whole list (not pick-one — that's
  matrix.html). The point is the approver sees the batch's blast radius at a
  glance instead of opening N PRs.

    - Title <= ~6 words, with the count: "Ship this batch? (4)".
    - One row per item; columns are SHORT tags (area · risk · reversible), never
      sentences. Mark the row(s) worth a second look with class="watch".
    - Two option chips <= ~6 words; recommended one gets class="rec".
  If a row needs a sentence to explain it, it doesn't belong in the manifest —
  link that one PR separately. The risk column does the arguing.

  This example is generic — replace the rows with your real items.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         background: #f5f6f8; color: #1e293b; padding: 40px; }
  .card { width: 720px; background: #fff; border-radius: 16px; padding: 32px 36px;
          box-shadow: 0 10px 40px rgba(15,23,42,.08); border: 1px solid #e8ebf0; }
  h1 { font-size: 21px; font-weight: 700; color: #0f2742; margin-bottom: 22px; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14.5px; }
  th, td { padding: 11px 16px; text-align: left; border-bottom: 1px solid #eef1f5; }
  th:nth-child(n+2), td:nth-child(n+2) { text-align: center; }
  thead th { font-size: 12px; text-transform: uppercase; letter-spacing: .04em;
             color: #64748b; font-weight: 600; }
  tbody td:first-child { font-weight: 600; color: #0f2742; }
  .tag { display: inline-block; font-size: 11.5px; font-weight: 700; border-radius: 999px; padding: 2px 10px; }
  .low  { color: #15803d; background: #dcfce7; }
  .med  { color: #b45309; background: #fef3c7; }
  .high { color: #b91c1c; background: #fee2e2; }
  .yes { color: #15803d; font-weight: 700; }
  .no  { color: #b91c1c; font-weight: 700; }
  .watch { background: #fff7ed; }
  .watch td { border-bottom: 1px solid #fde6cf; }
  .opts { display: flex; gap: 10px; margin-top: 22px; }
  .opt { flex: 1; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 13px 16px;
         font-size: 14.5px; font-weight: 600; color: #334155; }
  .opt.rec { border-color: #15803d; color: #0f2742; }
  .opt .n { color: #94a3b8; font-weight: 700; margin-right: 6px; }
  .opt.rec .n { color: #15803d; }
  .opt.rec::after { content: " ✓"; color: #15803d; }
</style>
</head>
<body>
  <div class="card">
    <h1>Ship this batch? (4)</h1>
    <table>
      <thead>
        <tr><th>Change</th><th>Area</th><th>Risk</th><th>Reversible</th></tr>
      </thead>
      <tbody>
        <tr><td>Rate-limit login</td><td>Auth</td><td><span class="tag low">low</span></td><td class="yes">✓</td></tr>
        <tr><td>Dark-mode contrast fix</td><td>UI</td><td><span class="tag low">low</span></td><td class="yes">✓</td></tr>
        <tr class="watch"><td>Index on orders</td><td>DB</td><td><span class="tag med">migration</span></td><td class="yes">✓</td></tr>
        <tr><td>Pricing page copy</td><td>Content</td><td><span class="tag low">low</span></td><td class="yes">✓</td></tr>
      </tbody>
    </table>
    <div class="opts">
      <div class="opt rec"><span class="n">1</span>Ship all four</div>
      <div class="opt"><span class="n">2</span>Hold the DB one</div>
    </div>
  </div>
</body>
</html>
